name: Video Compression Pipeline

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Stream URL (m3u8) or Video URL'
        required: true
        type: string
      crf_value:
        description: 'Compression quality (CRF 0-51: Higher means lower quality. 23-28 is ideal)'
        required: false
        default: '28'
        type: string

jobs:
  compress_and_upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl

      - name: Process and Compress Stream
        run: |
          echo "Processing video stream directly from source..."
          # ffmpeg can read hls streams natively. 
          # -protocol_whitelist allows it to securely request the segments listed in the m3u8 file.
          ffmpeg -protocol_whitelist file,http,https,tcp,tls,crypto \
            -i "${{ github.event.inputs.video_url }}" \
            -vcodec libx264 \
            -crf ${{ github.event.inputs.crf_value }} \
            -vf "scale='min(1280,iw)':-2" \
            -acodec aac \
            -b:a 128k \
            compressed_video.mp4

      - name: Upload to Koofr via WebDAV
        env:
          KOOFR_USER: "mf.y.dk745@gmail.com"
          KOOFR_PASS: "twkuw4cdrkwx8wnp"
        run: |
          echo "Uploading to Koofr..."
          FILENAME="compressed_$(date +'%Y%m%d_%H%M%S').mp4"
          
          curl -u "$KOOFR_USER:$KOOFR_PASS" \
            -T compressed_video.mp4 \
            "https://app.koofr.net/dav/Koofr/$FILENAME"
          
          echo "Upload complete!"
