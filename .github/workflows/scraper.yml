name: Video Scraper and Koofr Uploader

on:
  workflow_dispatch:
    inputs:
      search_term:
        description: 'The search term to scrape videos for'
        required: true
        default: 'nature'
      max_videos:
        description: 'Maximum number of videos to download'
        required: true
        default: '3'

jobs:
  scrape_and_upload:
    runs-on: ubuntu-latest

    env:
      WEBDAV_URL: "https://app.koofr.net/dav/Koofr"
      WEBDAV_USER: "kez.o.o.ist.unl.i@gmail.com"
      WEBDAV_PASS: "ibvcgsmuw8acqzzz"
      TOTAL_STORAGE_GB: 10

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-state: '3.10'

    - name: Install System Dependencies (FFmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp

    - name: Process Videos
      run: |
        cat << 'EOF' > pipeline.py
        import os
        import random
        import string
        import subprocess
        import json

        SEARCH_TERM = os.getenv("SEARCH_TERM", "nature")
        MAX_VIDEOS = int(os.getenv("MAX_VIDEOS", "3"))
        WEBDAV_URL = os.getenv("WEBDAV_URL")
        WEBDAV_USER = os.getenv("WEBDAV_USER")
        WEBDAV_PASS = os.getenv("WEBDAV_PASS")
        TOTAL_LIMIT_BYTES = 10 * 1024 * 1024 * 1024  # 10 GB

        def generate_random_name():
            # Generates a random lowercase alphanumeric string (no symbols)
            chars = string.ascii_lowercase + string.digits
            return ''.join(random.choice(chars) for _ in range(16)) + ".mp4"

        def get_koofr_used_space():
            # Checks WebDAV storage metrics using a PROPFIND quota request
            cmd = [
                "curl", "-s", "-X", "PROPFIND",
                "--header", "Depth: 0",
                "--header", "Content-Type: text/xml",
                "--data", '<?xml version="1.0" encoding="utf-8" ?><D:propfind xmlns:D="DAV:"><D:prop><D:quota-used-bytes/></D:prop></D:propfind>',
                "-u", f"{WEBDAV_USER}:{WEBDAV_PASS}",
                WEBDAV_URL
            ]
            try:
                res = subprocess.run(cmd, capture_output=True, text=True)
                # Parse the raw bytes tag out of the XML response safely
                if "<d:quota-used-bytes>" in res.stdout:
                    start = res.stdout.find("<d:quota-used-bytes>") + len("<d:quota-used-bytes>")
                    end = res.stdout.find("</d:quota-used-bytes>")
                    return int(res.stdout[start:end])
                elif "<D:quota-used-bytes>" in res.stdout:
                    start = res.stdout.find("<D:quota-used-bytes>") + len("<D:quota-used-bytes>")
                    end = res.stdout.find("</D:quota-used-bytes>")
                    return int(res.stdout[start:end])
            except Exception as e:
                print(f"Warning: Could not extract space data: {e}")
            return 0

        def print_storage_status():
            used_bytes = get_koofr_used_space()
            used_gb = used_bytes / (1024 ** 3)
            percent = (used_bytes / TOTAL_LIMIT_BYTES) * 100 if TOTAL_LIMIT_BYTES > 0 else 0
            print("\n" + "="*50)
            print(f"STORAGE MONITOR: {used_gb:.2f} GB / 10.00 GB used ({percent:.2f}%)")
            print("="*50 + "\n")

        def run():
            print_storage_status()

            # Search queries URL construction for scraping video landing targets
            search_url = f"ytsearch{MAX_VIDEOS}:pornhub {SEARCH_TERM}"
            print(f"Searching and downloading top {MAX_VIDEOS} items matching: '{SEARCH_TERM}'")

            # Download using a generic output structure, enforce format conversion via ffmpeg post-processor
            # ytdlp automatically changes any container (like transport streams .ts) into standard mp4 container
            ydl_opts = [
                "yt-dlp",
                "--max-downloads", str(MAX_VIDEOS),
                "--format", "bv*[ext=mp4]+ba[ext=m4a]/b[ext=mp4] / bv*+ba/b",
                "--merge-output-format", "mp4",
                "-o", "temp_video_download.%(ext)s",
                search_url
            ]
            
            subprocess.run(ydl_opts)

            # Look through local workspace items
            for file in os.listdir("."):
                if file.startswith("temp_video_download"):
                    # Double-check formats to explicitly enforce compliance 
                    base, ext = os.path.splitext(file)
                    target_name = generate_random_name()
                    
                    if ext.lower() != ".mp4":
                        print(f"Normalizing internal stream {file} into {target_name} via FFmpeg...")
                        subprocess.run(["ffmpeg", "-i", file, "-c", "copy", target_name, "-y"])
                        os.remove(file)
                    else:
                        os.rename(file, target_name)
                    
                    # Upload process via HTTP PUT
                    print(f"Uploading {target_name} to Koofr account WebDAV network location...")
                    upload_url = f"{WEBDAV_URL}/{target_name}"
                    upload_cmd = [
                        "curl", "-s", "-T", target_name,
                        "-u", f"{WEBDAV_USER}:{WEBDAV_PASS}",
                        upload_url
                    ]
                    subprocess.run(upload_cmd)
                    
                    # Cleanup local node footprint
                    if os.path.exists(target_name):
                        os.remove(target_name)
                    
                    # Live tracking status display
                    print_storage_status()

        if __name__ == "__main__":
            run()
        EOF

        python pipeline.py
      env:
        SEARCH_TERM: ${{ github.event.inputs.search_term }}
        MAX_VIDEOS: ${{ github.event.inputs.max_videos }}
